<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzle Select</title>
    <link rel="icon" type="image/png" href="./tab_icon.png">

    <link rel="stylesheet" type="text/css" href="./style.css">

    <!--Necessary for p5.sound to work in http server-->
    <script src="https://unpkg.com/@free-side/audioworklet-polyfill/dist/audioworklet-polyfill.js" type="text/javascript"></script>
    <script src="../libraries/p5.min.js"></script>
    <script src="../libraries/p5.sound.min.js"></script>
  </head>

  <body>
    <div id="hintDisplay" style="position: absolute; top: 225px; left: 10px; z-index: 1000;">
      <p>Number of Hints: <span id="hintCount">0</span></p>
    </div>
    <div id="currencyDisplay" style="position: absolute; top: 253px; left: 10px; z-index: 1000;">
      <p>Coins: <span id="currencyCount">0</span></p>
    </div>

    <script src="utilities.js"></script>
    <script src="puzzleSelect.js"></script>

    <h3>Puzzles: </h3>
    <button onclick="window.location.href='nurikabe/nurikabe.html?size=7'" style="position: absolute; top: 60px; left: 10px; z-index: 1000;">Nurikabe (Easy)</button>
    <button onclick="window.location.href='nurikabe/nurikabe.html?size=9'" style="position: absolute; top: 110px; left: 10px; z-index: 1000;">Nurikabe (Medium)</button>
    <button onclick="window.location.href='nurikabe/nurikabe.html?size=11'" style="position: absolute; top: 160px; left: 10px; z-index: 1000;">Nurikabe (Hard)</button>

    <button onclick="buyHint(10)" style="position: absolute; top: 300px; left: 10px; z-index: 1000;">
        Buy Hint (Cost: 10 Coins)
    </button>

    <div id="musicControls" style="position: absolute; top: 380px; left: 10px; z-index: 1000;">
      <label for="musicVolumeSlider" style="font-family: monospace;">Music Volume</label>
      <br>
      <input id="musicVolumeSlider" type="range" min="0" max="100" value="50">
      <br><br>
      <button id="muteMusicButton">Mute</button>
    </div>
  </body>
  <style>
    button { 
      background-color: whitesmoke;
      color: rgb(69, 69, 69);
      text-align: center;
      font-size: 16px;
      font-family: monospace;
      cursor: pointer;
      border: 4px solid blue;
      padding: 10px;
      border-radius: 8px;
      transition-duration: 0.2s;
    }
    button:hover {
      color: whitesmoke;
      background-color: blue;
      border: 4px solid rgb(120, 120, 120);
      border-radius: 16px;
    }

    h2{font-family: monospace;}
    ul{font-family: monospace;}
  </style>
</html>
